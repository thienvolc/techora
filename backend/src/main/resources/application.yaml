spring:
  application:
    name: techora

  datasource:
    url: jdbc:postgresql://localhost:5432/techora
    username: techora
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 1s
      timeout: 1s
      lettuce:
        shutdown-timeout: 100ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: techora-api-${random.uuid}
      auto-offset-reset: latest

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    enable:
      cache: true

security:
  jwt:
    secret: "change-this-secret-key-to-at-least-32-characters"
    expiration-seconds: 3600

app:
  cache:
    local:
      maximum-size: 10000
    ttl:
      default-ttl: 10m
      product-detail: 10m
      product-listing: 60s
      active-categories: 30m
      local-product-detail: 60s
      local-product-listing: 30s
      local-active-categories: 5m
  rate-limit:
    browse:
      enabled: true
      limit-for-period: 120
      limit-refresh-period: 1m
      timeout-duration: 0s
      maximum-clients: 10000
  events:
    mode: local
    topic: techora.events
    fallback-on-kafka-error: true
  message-policy:
    min-length: 1
    max-length: 2000
    max-messages-per-window: 10
    window-seconds: 10
    duplicate-cooldown-seconds: 5
  outbox:
    worker-delay-ms: 2000
    retry:
      max-retries: 5
      max-backoff-seconds: 60
      step-backoff-seconds: 5
  runtime:
    instance-id: ${HOSTNAME:${random.uuid}}

payment:
  providers:
    vnpay:
      terminal-code: ${VNPAY_TMN_CODE:DEMO}
      hash-secret: ${VNPAY_HASH_SECRET:DEMO}
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return/%s}
      payment-timeout-minutes: ${VNPAY_PAYMENT_TIMEOUT_MINUTES:15}
