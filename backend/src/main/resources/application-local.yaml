spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/techora
    username: techora
    password: 12345
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: techora-api-${random.uuid}
      auto-offset-reset: latest
  jpa:
    hibernate:
      ddl-auto: update

security:
  jwt:
    secret: "change-this-secret-key-to-at-least-32-characters"
    expiration-seconds: 3600

app:
  events:
    mode: local
    topic: techora.events
    payment-topic: techora.payment.events
    fallback-on-kafka-error: true
  message-policy:
    min-length: 1
    max-length: 2000
    max-messages-per-window: 10
    window-seconds: 10
    duplicate-cooldown-seconds: 5
  outbox:
    worker-delay-ms: 2000
    relay:
      delay-ms: 2000
      batch-size: 100
      event-types: PAYMENT_CONFIRMED,PAYMENT_FAILED,PAYMENT_RECONCILIATION_REQUIRED
  runtime:
    instance-id: ${HOSTNAME:${random.uuid}}

payment:
  window-timeout-minutes: ${PAYMENT_WINDOW_TIMEOUT_MINUTES:60}
  providers:
    vnpay:
      terminal-code: ${VNPAY_TMN_CODE:DEMO}
      hash-secret: ${VNPAY_HASH_SECRET:DEMO}
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return/%s}
      payment-timeout-minutes: ${VNPAY_PAYMENT_TIMEOUT_MINUTES:15}
