spring:
  datasource:
    url: jdbc:h2:mem:techora_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: techora-test
      auto-offset-reset: latest
  jpa:
    hibernate:
      ddl-auto: create-drop

security:
  jwt:
    secret: "change-this-secret-key-to-at-least-32-characters"
    expiration-seconds: 3600

app:
  events:
    mode: local
    topic: techora.events
    payment-topic: techora.payment.events
    fallback-on-kafka-error: true
  message-policy:
    min-length: 1
    max-length: 2000
    max-messages-per-window: 50
    window-seconds: 10
    duplicate-cooldown-seconds: 1
  outbox:
    worker-delay-ms: 5000
    relay:
      delay-ms: 5000
      batch-size: 100
      event-types: PAYMENT_CONFIRMED,PAYMENT_FAILED,PAYMENT_RECONCILIATION_REQUIRED
    retry:
      max-retries: 3
      max-backoff-seconds: 1
      step-backoff-seconds: 1
      processing-timeout-seconds: 30
  runtime:
    instance-id: techora-test

payment:
  window-timeout-minutes: 60
  providers:
    vnpay:
      terminal-code: ${VNPAY_TMN_CODE:DEMO}
      hash-secret: ${VNPAY_HASH_SECRET:DEMO}
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return/%s}
      payment-timeout-minutes: ${VNPAY_PAYMENT_TIMEOUT_MINUTES:15}
